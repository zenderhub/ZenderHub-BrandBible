<!doctype html><html lang="en"><head><meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Exo:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
:root{
  --primary:#A3086A; --primary-soft:#C8228A; --primary-acc:#D44FA0;
  --accent:#009CC9; --accent-soft:#2BB8E0;
  --base:#FFFFFF;
  --ink:#1A1A24; --ink-2:#3E3E50; --ink-3:#7A7A90; --ink-muted:#ADADC0;
  --border-default:rgba(163,8,106,.18);
  --grad-text:linear-gradient(96deg,#A3086A 0%,#009CC9 100%);
  --grad-sig:linear-gradient(245deg,#A3086A 26%,#009CC9 70%);
  --f-display:'Exo',sans-serif; --f-body:'Plus Jakarta Sans',system-ui,sans-serif; --f-mono:'JetBrains Mono',monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:#dde0e8}
.slide{position:relative;width:1080px;height:1350px;overflow:hidden;background:var(--base);
  color:var(--ink);font-family:var(--f-body);-webkit-font-smoothing:antialiased;text-rendering:geometricPrecision}

/* top gradient bar */
.topline{position:absolute;left:0;right:0;top:0;height:6px;background:var(--grad-sig);z-index:6}

/* photo — full-bleed, fluid fade to WHITE */
.band{position:absolute;inset:0;overflow:hidden;z-index:1;background:#f0f0f0}
.band img{width:100%;height:100%;object-fit:cover;object-position:var(--bp,center);display:block;
  /* desaturate + brighten for light feel */
  filter:grayscale(.45) contrast(.95) brightness(1.08) saturate(.70)}
/* subtle warm-light tint instead of dark overlay */
.band .tint{position:absolute;inset:0;
  background:linear-gradient(245deg,rgba(163,8,106,.15) 0%,rgba(0,156,201,.08) 100%);
  mix-blend-mode:multiply}
/* fade photo → white from 38% down */
.band .fade{position:absolute;inset:0;
  background:linear-gradient(180deg,
    rgba(255,255,255,0)    0%,
    rgba(255,255,255,0)    28%,
    rgba(255,255,255,.06)  36%,
    rgba(255,255,255,.20)  42%,
    rgba(255,255,255,.44)  48%,
    rgba(255,255,255,.66)  54%,
    rgba(255,255,255,.82)  60%,
    rgba(255,255,255,.93)  67%,
    rgba(255,255,255,.985) 76%,
    #FFFFFF               100%)}

/* eyebrow strip — sits on photo area */
.top{position:absolute;top:52px;left:72px;right:72px;z-index:4;display:flex;justify-content:space-between;align-items:center}
.eyebrow{font-family:var(--f-mono);font-weight:500;font-size:25px;letter-spacing:.16em;text-transform:uppercase;
  color:rgba(255,255,255,.95);display:inline-flex;align-items:center;gap:16px;
  text-shadow:0 2px 12px rgba(0,0,0,.45)}
.eyebrow::before{content:"";width:34px;height:2px;background:rgba(255,255,255,.75)}
.tag-r{font-family:var(--f-mono);font-weight:500;font-size:24px;letter-spacing:.12em;text-transform:uppercase;
  color:rgba(255,255,255,.85);text-shadow:0 2px 12px rgba(0,0,0,.40)}

/* big outline number — ghost watermark */
.bandnum{position:absolute;right:28px;top:140px;z-index:2;font-family:var(--f-display);font-weight:800;
  font-size:200px;line-height:.78;color:transparent;
  -webkit-text-stroke:1.5px rgba(163,8,106,.14);letter-spacing:-.04em}

/* main layout — content zone starts at ~52% */
.wrap{position:relative;z-index:3;padding:660px 72px 68px;display:flex;flex-direction:column;gap:44px}
.main{display:flex;flex-direction:column;gap:28px}

/* divider */
.divider{width:64px;height:5px;border-radius:99px;background:var(--grad-sig)}

/* headline */
.acc{font-family:var(--f-display);font-weight:800;text-transform:uppercase;letter-spacing:-.022em;line-height:.95;font-size:76px;color:var(--ink)}
.mg{color:var(--primary)}
.hl{background:var(--grad-text);-webkit-background-clip:text;background-clip:text;color:transparent}

/* sub */
.sub{font-family:var(--f-body);font-weight:500;font-size:34px;line-height:1.36;color:var(--ink-2);display:flex;align-items:baseline;gap:16px}
.sub .big5{font-family:var(--f-display);font-weight:800;font-size:76px;background:var(--grad-text);-webkit-background-clip:text;background-clip:text;color:transparent;line-height:.88}

/* chips */
.chips{display:flex;flex-wrap:wrap;gap:12px}
.chip{font-family:var(--f-mono);font-weight:500;font-size:22px;letter-spacing:.03em;color:var(--ink-2);
  border:1.5px solid rgba(0,0,0,.12);border-radius:999px;padding:11px 22px;background:rgba(255,255,255,.75);
  backdrop-filter:blur(2px)}
.chip.on{color:var(--primary);border-color:rgba(163,8,106,.35);background:rgba(163,8,106,.05)}

/* CTA */
.btn{display:inline-flex;align-items:center;gap:18px;align-self:flex-start;
  font-family:var(--f-display);font-weight:700;font-size:32px;text-transform:uppercase;letter-spacing:.005em;color:#fff;
  background:var(--grad-sig);border-radius:999px;padding:26px 46px;
  box-shadow:0 16px 48px -10px rgba(163,8,106,.38)}

/* footer */
.foot{display:flex;align-items:center;justify-content:space-between}
.segs{display:flex;gap:10px}
.segs i{width:50px;height:7px;border-radius:99px;background:rgba(0,0,0,.10)}
.segs i.on{background:var(--grad-sig)}
.foot .url{font-family:var(--f-mono);font-weight:500;font-size:24px;letter-spacing:.05em;color:var(--ink-muted)}
.swipe{font-family:var(--f-mono);font-weight:500;font-size:24px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-3);display:inline-flex;align-items:center;gap:12px}
.swipe .ar{color:var(--accent);font-size:28px}

/* logo */
.flogo{display:inline-flex;align-items:center;gap:10px}
.flogo .wordmark{font-family:var(--f-display);font-weight:800;font-size:28px;color:var(--ink);letter-spacing:-.01em}
.flogo .wordmark span{background:var(--grad-text);-webkit-background-clip:text;background-clip:text;color:transparent}
</style></head><body>

<div class="slide" style="--bh:660px">
  <div class="topline"></div>

  <!-- full-bleed photo fading to white -->
  <div class="band">
    <img src="img/s1.jpg" style="--bp:center 42%"/>
    <div class="tint"></div>
    <div class="fade"></div>
  </div>

  <!-- ghost number watermark -->
  <div class="bandnum">5</div>

  <!-- eyebrow over photo -->
  <div class="top">
    <span class="eyebrow">logistics audit</span>
    <span class="tag-r">DTC brands &middot; $5M&ndash;$50M</span>
  </div>

  <!-- content on white zone -->
  <div class="wrap">
    <div class="main">
      <div class="divider"></div>
      <div class="acc">YOUR SHIPPING OPS<br>ARE <span class="mg">BLEEDING</span><br><span class="hl">REAL MONEY.</span></div>
      <div class="sub"><span class="big5">5</span><span>signs you haven&rsquo;t<br>noticed yet.</span></div>
    </div>

    <div class="chips">
      <span class="chip on">Real numbers only</span>
      <span class="chip">No pitch deck</span>
      <span class="chip">Straight answer in 48h</span>
    </div>

    <a class="btn">GET A FREE LOGISTICS AUDIT <span class="arr">&rarr;</span></a>

    <div class="foot">
      <span class="swipe">swipe <span class="ar">&rarr;</span></span>
      <span class="flogo">
        <svg width="36" height="36" viewBox="0 0 68.74 69" fill="none" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="lg2" x1="0" y1="0" x2="68.74" y2="69" gradientUnits="userSpaceOnUse">
              <stop offset="0%" stop-color="#A3086A"/>
              <stop offset="100%" stop-color="#009CC9"/>
            </linearGradient>
          </defs>
          <path d="M68.7393 22.77V0H22.9118C10.3055 0 0.0779315 10.181 0 22.77H68.7355H68.7393Z" fill="url(#lg2)"/>

          <path d="M24.5456 44.8481H44.1918C46.8154 42.2917 48.4483 38.7261 48.4483 34.7747C48.4483 30.5301 46.5631 26.7271 43.5869 24.1484H25.1505C22.178 26.7271 20.2891 30.5301 20.2891 34.7747C20.2891 38.7261 21.9219 42.2917 24.5456 44.8481ZM34.2611 27.5211C38.2244 27.5211 41.4382 30.7342 41.4382 34.6968C41.4382 38.6593 38.2244 41.8724 34.2611 41.8724C30.2977 41.8724 27.0839 38.6593 27.0839 34.6968C27.0839 30.7342 30.2977 27.5211 34.2611 27.5211Z" fill="url(#lg2)"/>
          <path d="M0 46.2266V68.9965H45.8274C58.4337 68.9965 68.6613 58.8155 68.7355 46.2266H0Z" fill="url(#lg2)"/>
          <path d="M1.23633 44.8472H17.8914C16.0878 41.9124 15.045 38.4619 15.045 34.7738C15.045 33.3009 15.2157 31.8687 15.5275 30.4922L1.23633 44.8472Z" fill="url(#lg2)"/>
        </svg>
        <span class="wordmark"><span>Zender</span>Hub</span>
      </span>
    </div>
  </div>
</div>

</body></html>
