<!doctype html><html lang="en"><head><meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Exo:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
:root{
  --primary:#A3086A; --primary-soft:#C8228A; --primary-acc:#D44FA0; --primary-deep:#6F0548;
  --accent:#009CC9; --accent-soft:#2BB8E0;
  --base:#FFFFFF; --surface:#F6F6F9; --surface-2:#EEEEF4;
  --ink:#1A1A24; --ink-2:#3E3E50; --ink-3:#7A7A90; --ink-muted:#ADADC0;
  --border-subtle:rgba(0,0,0,.07); --border-default:rgba(163,8,106,.18);
  --grad-text:linear-gradient(96deg,#A3086A 0%,#009CC9 100%);
  --grad-sig:linear-gradient(245deg,#A3086A 26%,#009CC9 70%);
  --f-display:'Exo',sans-serif; --f-body:'Plus Jakarta Sans',system-ui,sans-serif; --f-mono:'JetBrains Mono',monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:#e8e8ee}
.slide{position:relative;width:1080px;height:1350px;overflow:hidden;background:var(--base);
  color:var(--ink);font-family:var(--f-body);-webkit-font-smoothing:antialiased;text-rendering:geometricPrecision}

/* top accent bar */
.topline{position:absolute;left:0;right:0;top:0;height:6px;background:var(--grad-sig);z-index:6}

/* photo — contained card, top of slide */
.photo-frame{position:absolute;top:0;left:0;right:0;height:540px;z-index:1;overflow:hidden;
  border-radius:0 0 48px 48px}
.photo-frame img{width:100%;height:100%;object-fit:cover;object-position:center 42%;display:block;
  filter:grayscale(.15) contrast(1.02) brightness(.92) saturate(.88)}
.photo-frame .tint{position:absolute;inset:0;
  background:linear-gradient(245deg,rgba(163,8,106,.28) 0%,rgba(0,156,201,.14) 100%);
  mix-blend-mode:multiply}
/* fade bottom of photo to white */
.photo-frame .fade{position:absolute;inset:0;
  background:linear-gradient(180deg,
    rgba(255,255,255,0) 0%,
    rgba(255,255,255,0) 48%,
    rgba(255,255,255,.18) 62%,
    rgba(255,255,255,.55) 76%,
    rgba(255,255,255,.85) 88%,
    #FFFFFF 100%)}

/* eyebrow strip — sits on top of photo */
.top{position:absolute;top:52px;left:72px;right:72px;z-index:4;display:flex;justify-content:space-between;align-items:center}
.eyebrow{font-family:var(--f-mono);font-weight:500;font-size:25px;letter-spacing:.16em;text-transform:uppercase;
  color:rgba(255,255,255,.92);display:inline-flex;align-items:center;gap:16px;
  text-shadow:0 2px 14px rgba(0,0,0,.55)}
.eyebrow::before{content:"";width:34px;height:2px;background:rgba(255,255,255,.70)}
.tag-r{font-family:var(--f-mono);font-weight:500;font-size:24px;letter-spacing:.12em;text-transform:uppercase;
  color:rgba(255,255,255,.78);text-shadow:0 2px 14px rgba(0,0,0,.55)}

/* main layout — below photo */
.wrap{position:relative;z-index:3;padding:500px 72px 68px;display:flex;flex-direction:column;gap:48px}
.main{display:flex;flex-direction:column;gap:32px}

/* headline */
.acc{font-family:var(--f-display);font-weight:800;text-transform:uppercase;letter-spacing:-.022em;line-height:.95;font-size:76px;color:var(--ink)}
.mg{color:var(--primary)}
.cy{color:var(--accent)}
.hl{background:var(--grad-text);-webkit-background-clip:text;background-clip:text;color:transparent}

/* sub headline */
.sub{font-family:var(--f-body);font-weight:500;font-size:36px;line-height:1.36;color:var(--ink-2);display:flex;align-items:baseline;gap:18px}
.sub .big5{font-family:var(--f-display);font-weight:800;font-size:80px;background:var(--grad-text);-webkit-background-clip:text;background-clip:text;color:transparent;line-height:.88}

/* divider */
.divider{width:64px;height:5px;border-radius:99px;background:var(--grad-sig)}

/* chips */
.chips{display:flex;flex-wrap:wrap;gap:12px}
.chip{font-family:var(--f-mono);font-weight:500;font-size:22px;letter-spacing:.03em;color:var(--ink-2);
  border:1.5px solid var(--border-default);border-radius:999px;padding:11px 22px;background:var(--surface)}
.chip.on{color:var(--primary);border-color:rgba(163,8,106,.38);background:rgba(163,8,106,.06)}

/* CTA button */
.btn{display:inline-flex;align-items:center;gap:18px;align-self:flex-start;
  font-family:var(--f-display);font-weight:700;font-size:32px;text-transform:uppercase;letter-spacing:.005em;color:#fff;
  background:var(--grad-sig);border-radius:999px;padding:26px 46px;
  box-shadow:0 16px 48px -10px rgba(163,8,106,.42)}
.btn .arr{font-weight:800}

/* footer */
.foot{display:flex;align-items:center;justify-content:space-between}
.segs{display:flex;gap:10px}
.segs i{width:50px;height:7px;border-radius:99px;background:var(--surface-2)}
.segs i.on{background:var(--grad-sig)}
.foot .url{font-family:var(--f-mono);font-weight:500;font-size:24px;letter-spacing:.05em;color:var(--ink-muted)}
.swipe{font-family:var(--f-mono);font-weight:500;font-size:24px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-3);display:inline-flex;align-items:center;gap:12px}
.swipe .ar{color:var(--accent);font-size:28px}

/* logo — dark version using gradient mark + ink wordmark */
.flogo{display:inline-flex;align-items:center;gap:10px}
.flogo .logomark svg{height:36px;width:auto;display:block}
.flogo .wordmark{font-family:var(--f-display);font-weight:800;font-size:28px;color:var(--ink);letter-spacing:-.01em}
.flogo .wordmark span{background:var(--grad-text);-webkit-background-clip:text;background-clip:text;color:transparent}
</style></head><body>

<div class="slide">
  <div class="topline"></div>

  <!-- photo contained card -->
  <div class="photo-frame">
    <img src="img/s1.jpg" />
    <div class="tint"></div>
    <div class="fade"></div>
  </div>

  <!-- eyebrow over photo -->
  <div class="top">
    <span class="eyebrow">logistics audit</span>
    <span class="tag-r">DTC brands &middot; $5M&ndash;$50M</span>
  </div>

  <!-- content below photo -->
  <div class="wrap">
    <div class="main">
      <div class="divider"></div>
      <div class="acc">YOUR SHIPPING OPS<br>ARE <span class="mg">BLEEDING</span><br><span class="hl">REAL MONEY.</span></div>
      <div class="sub"><span class="big5">5</span><span>signs you haven&rsquo;t<br>noticed yet.</span></div>
    </div>

    <div class="chips">
      <span class="chip on">Real numbers only</span>
      <span class="chip">No pitch deck</span>
      <span class="chip">Straight answer in 48h</span>
    </div>

    <a class="btn">GET A FREE LOGISTICS AUDIT <span class="arr">&rarr;</span></a>

    <div class="foot">
      <span class="swipe">swipe <span class="ar">&rarr;</span></span>
      <span class="flogo">
        <span class="logomark">
          <!-- ZenderHub logomark icon in gradient -->
          <svg width="38" height="38" viewBox="0 0 68.74 69" fill="none" xmlns="http://www.w3.org/2000/svg">
            <defs>
              <linearGradient id="lg1" x1="0" y1="0" x2="68.74" y2="69" gradientUnits="userSpaceOnUse">
                <stop offset="0%" stop-color="#A3086A"/>
                <stop offset="100%" stop-color="#009CC9"/>
              </linearGradient>
            </defs>
            <path d="M68.7393 22.77V0H22.9118C10.3055 0 0.0779315 10.181 0 22.77H68.7355H68.7393Z" fill="url(#lg1)"/>
            <path d="M67.5148 24.1484H50.4961C52.5149 27.1983 53.695 30.8492 53.695 34.7747C53.695 36.0658 53.5651 37.331 53.3202 38.5517L67.5148 24.1484Z" fill="url(#lg1)"/>
            <path d="M24.5456 44.8481H44.1918C46.8154 42.2917 48.4483 38.7261 48.4483 34.7747C48.4483 30.5301 46.5631 26.7271 43.5869 24.1484H25.1505C22.178 26.7271 20.2891 30.5301 20.2891 34.7747C20.2891 38.7261 21.9219 42.2917 24.5456 44.8481ZM34.2611 27.5211C38.2244 27.5211 41.4382 30.7342 41.4382 34.6968C41.4382 38.6593 38.2244 41.8724 34.2611 41.8724C30.2977 41.8724 27.0839 38.6593 27.0839 34.6968C27.0839 30.7342 30.2977 27.5211 34.2611 27.5211Z" fill="url(#lg1)"/>
            <path d="M0 46.2266V68.9965H45.8274C58.4337 68.9965 68.6613 58.8155 68.7355 46.2266H0Z" fill="url(#lg1)"/>
            <path d="M1.23633 44.8472H17.8914C16.0878 41.9124 15.045 38.4619 15.045 34.7738C15.045 33.3009 15.2157 31.8687 15.5275 30.4922L1.23633 44.8472Z" fill="url(#lg1)"/>
          </svg>
        </span>
        <span class="wordmark"><span>Zender</span>Hub</span>
      </span>
    </div>
  </div>
</div>

</body></html>
